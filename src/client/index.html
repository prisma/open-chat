<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open Chat</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='9' fill='%235d58c6'/%3E%3Cg transform='translate(4 4)'%3E%3Cpath fill='%23fff' fill-rule='evenodd' d='M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2zM13.2 4.8 8.4 11.1h2.9l-.5 4.1 4.8-6.3h-2.9z'/%3E%3C/g%3E%3C/svg%3E"
    />
    <script type="module" src="./main.tsx"></script>
  </head>
  <body>
    <div id="root"></div>
    <!-- Boot overlay: covers the page from the first byte of HTML until the
         app signals readiness (dismissBootScreen in App.tsx). Lives outside
         #root so React mounting doesn't remove it mid-load. -->
    <style>
      #boot { position: fixed; inset: 0; z-index: 100; display: grid; place-items: center; background: #f7f7f5; transition: opacity 0.25s ease; }
      #boot svg { animation: boot-pulse 1.1s ease-in-out infinite; }
      #boot.done { opacity: 0; pointer-events: none; }
      #boot.done svg { animation: none; transition: transform 0.25s ease; transform: scale(1.15); }
      @keyframes boot-pulse { 50% { opacity: 0.55; transform: scale(0.94); } }
      @media (prefers-color-scheme: dark) { #boot { background: #131316; } }
    </style>
    <div id="boot" aria-hidden="true">
      <svg width="44" height="44" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <rect width="32" height="32" rx="9" fill="#5d58c6"/>
        <g transform="translate(4 4)">
          <path fill="#fff" fill-rule="evenodd" d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2zM13.2 4.8 8.4 11.1h2.9l-.5 4.1 4.8-6.3h-2.9z"/>
        </g>
      </svg>
    </div>
  </body>
</html>
