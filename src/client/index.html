<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open Chat</title>
    <!-- Link-preview cards. The production server swaps title/description
         for route-specific variants (see src/server/client-assets.ts);
         crawlers need absolute image URLs, so this points at the live
         deployment. -->
    <meta property="og:site_name" content="Open Chat" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Open Chat — durable, open-source AI chat" />
    <meta
      property="og:description"
      content="Chat with any model on OpenRouter. Every token survives refreshes — built on Prisma Streams, Prisma Postgres, Prisma Next, and Prisma Compute."
    />
    <meta property="og:image" content="https://oss.chat/og-tour.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='9' fill='%235d58c6'/%3E%3Cg transform='translate(4 4)'%3E%3Cpath fill='%23fff' fill-rule='evenodd' d='M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2zM13.2 4.8 8.4 11.1h2.9l-.5 4.1 4.8-6.3h-2.9z'/%3E%3C/g%3E%3C/svg%3E"
    />
    <script type="module" src="./main.tsx"></script>
  </head>
  <body>
    <div id="root"></div>
    <!-- Boot overlay: covers the page from the first byte of HTML until the
         app signals readiness (dismissBootScreen in App.tsx), which flies
         the logo onto the in-app glyph and dissolves the backdrop. Lives
         outside #root so React mounting doesn't remove it mid-load. The
         tile + inner-icon proportions mirror .wordmark-glyph so the logo
         lands pixel-perfect on its in-app counterpart. -->
    <style>
      #boot { position: fixed; inset: 0; z-index: 100; display: grid; place-items: center; background: #f7f7f5; transition: background-color 0.3s ease; }
      #boot.done { background-color: transparent; pointer-events: none; }
      .boot-logo { width: 44px; height: 44px; border-radius: 14px; background: var(--accent, #5d58c6); color: var(--accent-contrast, #fff); display: grid; place-items: center; animation: boot-pulse 1.1s ease-in-out infinite; }
      @keyframes boot-pulse { 50% { opacity: 0.55; transform: scale(0.94); } }
      @media (prefers-color-scheme: dark) { #boot { background: #131316; } }
    </style>
    <div id="boot" aria-hidden="true">
      <div class="boot-logo">
        <svg width="26" height="26" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path fill="currentColor" fill-rule="evenodd" d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2zM13.2 4.8 8.4 11.1h2.9l-.5 4.1 4.8-6.3h-2.9z"/>
        </svg>
      </div>
    </div>
  </body>
</html>
